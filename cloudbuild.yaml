substitutions:
  _TAG: 'latest'

steps:
  # ── Backend ────────────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/electioniq-backend:${_TAG}'
      - './backend'
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/electioniq-backend:${_TAG}']
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'electioniq-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/electioniq-backend:${_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,GOOGLE_CLOUD_PROJECT_ID=$PROJECT_ID,VERTEX_AI_LOCATION=us-central1,GEMINI_MODEL=gemini-2.5-flash,GEMINI_API_KEY=AIzaSyDObgDc6VORuswE4rmq7Dan0697b8PGXB0,CORS_ORIGIN=https://electioniq-frontend-198562073790.us-central1.run.app'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ── Frontend ───────────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/electioniq-frontend:${_TAG}'
      - '--build-arg'
      - 'VITE_API_BASE_URL=https://electioniq-backend-198562073790.us-central1.run.app'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=AIzaSyAN7g7IH48sewt93mFMFmEaYST7A-uPwpI'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=event-2c84a.firebaseapp.com'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=electioniq-494413'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=electioniq-494413.firebasestorage.app'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=115765876324'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=1:115765876324:web:53f9d0dec0ee9f6b25f171'
      - '--build-arg'
      - 'VITE_GOOGLE_MAPS_API_KEY=AIzaSyALUb-mAoJgYq-HCQdw7UYB4UMlmHAhKs8'
      - '--build-arg'
      - 'VITE_GOOGLE_CALENDAR_API_KEY=AIzaSyALUb-mAoJgYq-HCQdw7UYB4UMlmHAhKs8'
      - './frontend'
    id: 'build-frontend'
    waitFor: ['deploy-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/electioniq-frontend:${_TAG}']
    id: 'push-frontend'
    waitFor: ['build-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'electioniq-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/electioniq-frontend:${_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

images:
  - 'gcr.io/$PROJECT_ID/electioniq-backend:${_TAG}'
  - 'gcr.io/$PROJECT_ID/electioniq-frontend:${_TAG}'
