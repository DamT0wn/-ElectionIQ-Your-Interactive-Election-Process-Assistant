steps:
  # Build backend container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/electioniq-backend:$COMMIT_SHA', './backend']
    id: 'build-backend'

  # Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/electioniq-backend:$COMMIT_SHA']
    id: 'push-backend'
    waitFor: ['build-backend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'electioniq-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/electioniq-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production,GOOGLE_CLOUD_PROJECT_ID=$PROJECT_ID'
      # Configure secrets from Secret Manager
      - '--set-secrets'
      - 'VERTEX_AI_LOCATION=vertex-ai-location:latest,GEMINI_MODEL=gemini-model:latest'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Install frontend dependencies
  - name: 'node:20-slim'
    entrypoint: 'npm'
    args: ['ci']
    dir: './frontend'
    id: 'install-frontend'

  # Build frontend
  - name: 'node:20-slim'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: './frontend'
    id: 'build-frontend'
    waitFor: ['install-frontend']

  # Deploy frontend to Firebase Hosting (assuming Firebase is set up)
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--project=$PROJECT_ID', '--only=hosting']
    dir: './frontend'
    id: 'deploy-frontend'
    waitFor: ['build-frontend']

images:
  - 'gcr.io/$PROJECT_ID/electioniq-backend:$COMMIT_SHA'
